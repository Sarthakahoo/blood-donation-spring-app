<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Blood Donation - Login</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 35px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); width: 320px; border: 1px solid #e9ecef;}
        h2 { color: #d9534f; margin-bottom: 20px; font-weight: bold; text-align: center;}
        .form-label { display: block; margin-bottom: 6px; color: #6c757d; font-size: 0.85rem; font-weight: 500; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
        input:focus { border-color: #d9534f; outline: none; }
        button { width: 100%; padding: 12px; background-color: #d9534f; border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #c9302c; }
        a { display: block; text-align: center; margin-top: 15px; color: #6c757d; text-decoration: none; font-size: 0.85rem; }
        a:hover { color: #d9534f; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>User Login</h2>
        <label class="form-label">Username</label>
        <input type="text" id="username" placeholder="Enter username">
        <label class="form-label">Password</label>
        <input type="password" id="password" placeholder="Enter password">
        <button onclick="handleLogin()">Login</button>
        <a href="register.html">New to the center? Sign up here</a>
    </div>
    <script>
        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            if(res.ok) { window.location.href = 'dashboard.html'; } 
            else { const data = await res.json(); alert(data.message); }
        }
    </script>
</body>
</html>
